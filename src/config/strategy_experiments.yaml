# Self-growth experiment queue (G5). Human-reviewed via git.
# Lifecycle: proposed -> human_approved -> active_shadow -> ready_for_review -> promoted/rejected/archived.
# `growth experiments approve` only enables shadow paper; it NEVER switches active_strategy
# in strategy_registry.yaml. Promotion to the champion is always a manual YAML edit (G8).
#
# The four challengers below are pluggable-setup strategies (H4 setup-shadow). Each reuses the
# champion's scoring (aggressive_growth) so the candidate universe is identical, and differs ONLY in
# its entry logic via `policy_profile` (its own `setups` + thresholds in policy_profiles.json). They
# run every intraday tick in their own isolated paper ledger (experiments/<id>/paper/), so each
# really trades and is comparable via `growth recommend` + the dashboard. Champion is untouched.
